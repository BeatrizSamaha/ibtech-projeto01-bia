<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="diamond">
      <polygon points="50,2 98,50 50,98 2,50"/>
    </clipPath>
  </defs>
  <!-- fundo diamante preto -->
  <polygon points="50,2 98,50 50,98 2,50" fill="#0D0D0D"/>
  <!-- metade rosa (triângulo superior direito) -->
  <polygon points="50,2 98,50 50,50" fill="#FF1B8D" clip-path="url(#diamond)"/>
  <!-- letra B centralizada -->
  <text x="50" y="63" 
    font-family="Arial Black, sans-serif" 
    font-size="42" font-weight="900"
    fill="white" text-anchor="middle">B</text>
</svg>